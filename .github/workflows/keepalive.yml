name: Keep scheduled workflows alive

# GitHub disables scheduled workflows after 60 days of no repo activity.
# This weekly no-op commit keeps them enabled.

on:
  schedule:
    - cron: "31 12 * * 1"
  workflow_dispatch:

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Bump keepalive timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/keepalive
          date -u +%FT%TZ > .github/keepalive/last-bump
          git add .github/keepalive/last-bump
          if git diff --cached --quiet; then
            echo "Nothing to bump"
            exit 0
          fi
          git commit -m "chore(keepalive): $(date -u +%FT%TZ)"
          git push
